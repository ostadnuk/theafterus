<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>recall</title>
<style>
  html,body{ margin:0; height:100%; background:#050607; overflow:hidden; }

  /* ---- the matrix stream: many narrow columns of traces raining down ---- */
  #flow{ position:fixed; top:0; left:0; right:0; bottom:0;
    transition:opacity 1.6s ease; }
  #flow.dim{ opacity:.10; }
  .fcol{ position:absolute; top:0; will-change:transform; }
  .fimg{ display:block; transition:opacity .7s linear; }
  .fimg img{ width:100%; display:block; }

  /* ---- the arrest: one trace held, at its own proportion ---- */
  #focus{ position:fixed; z-index:6; opacity:0; transition:opacity 1.4s ease; }
  #focus.on{ opacity:1; }
  #focus img{ width:100%; display:block; }
  #focus .c{ position:absolute; width:22px; height:22px; border:2px solid #eef3f7; }
  #focus .c1{ top:-4px; left:-4px; border-right:none; border-bottom:none; }
  #focus .c2{ top:-4px; right:-4px; border-left:none; border-bottom:none; }
  #focus .c3{ bottom:-4px; left:-4px; border-right:none; border-top:none; }
  #focus .c4{ bottom:-4px; right:-4px; border-left:none; border-top:none; }

  .nb{ position:fixed; z-index:5; opacity:0;
    transition:opacity 1.1s ease, left 16s linear, top 16s linear; }
  .nb.on{ opacity:.88; }
  .nb img{ width:100%; display:block; }
</style>
</head>
<body>

<div id="flow"></div>
<div id="focus"><img><span class="c c1"></span><span class="c c2"></span><span class="c c3"></span><span class="c c4"></span></div>

<script>
/* her idle mind: many thin columns of traces raining downward, matrix-like.
   a reading arrests the rain — it freezes, dims to near-black, one trace is
   caught and centred, its true recollections surface — then the rain resumes.
   no text, no chrome. */
var MAP = null, replayEvents = [];
var TRACE_DUR = 26000, HOLD_FROM = 1200, RELEASE_AT = 20000;
var allPool = [], bag = [], bagPos = 0;
function reshuffle(){
  bag = allPool.slice();
  for (var i = bag.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var t = bag[i]; bag[i] = bag[j]; bag[j] = t;
  }
  bagPos = 0;
}
function nextItem(){
  if (!bag.length) return null;
  if (bagPos >= bag.length) reshuffle();
  return bag[bagPos++];
}
function thumbOfKey(key){
  var parts = key.split('/');
  var d = parts.slice(1, -1).join('/');
  var f = parts[parts.length - 1].replace(/\.gif$/i, '.png');
  return encodeURI('archives/thumbs/' + d + '/' + f);
}
function thumbOf(item){ return thumbOfKey('archives/' + item.d + '/' + item.f); }

/* ---- build the matrix rain ---- */
var cols = [], speedTarget = 1, speed = 1;
function buildFlow(){
  var flow = document.getElementById('flow');
  flow.innerHTML = '';
  cols = [];
  var W = innerWidth, H = innerHeight;
  var n = Math.max(6, Math.round(W / 120));   /* many narrow columns */
  var cw = Math.ceil(W / n);
  for (var i = 0; i < n; i++){
    var el = document.createElement('div');
    el.className = 'fcol';
    el.style.left = (i * cw) + 'px';
    el.style.width = cw + 'px';
    flow.appendChild(el);
    /* all rain downward, at varied speeds — matrix cadence */
    var col = { el: el, y: -Math.random() * H, v: 46 + Math.random() * 64, cells: [] };
    var need = Math.ceil(H / (cw * .8)) + 5;
    for (var k = 0; k < need; k++){
      var c = document.createElement('div');
      c.className = 'fimg';
      c._ph = Math.random() * Math.PI * 2;
      c.innerHTML = '<img>';
      el.appendChild(c);
      feed(c);
      col.cells.push(c);
    }
    cols.push(col);
  }
}
function feed(cell){
  var item = nextItem();
  if (!item) return;
  cell.querySelector('img').src = thumbOf(item);
}
var lastT = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  var dt = Math.min(.05, (now - lastT) / 1000);
  lastT = now;
  speed += (speedTarget - speed) * .045;
  var tw = now * .001;
  cols.forEach(function(col, ci){
    var gust = .7 + .45 * Math.sin(tw * .35 + ci * 1.3);
    col.y += col.v * gust * speed * dt;
    var guard = 0;
    /* when the first cell has fully entered, recycle from bottom to top */
    var firstH = col.cells[0] ? (col.cells[0].offsetHeight || 160) : 160;
    while (col.y > firstH && guard++ < 6){
      col.y -= firstH;
      var last = col.cells.pop();
      col.el.insertBefore(last, col.cells[0] || null);
      col.cells.unshift(last);
      feed(last);
      firstH = col.cells[0].offsetHeight || 160;
    }
    col.el.style.transform = 'translateY(' + (col.y - firstH) + 'px)';
  });
}
requestAnimationFrame(loop);

/* the wind: waves of darkness and light pass through the rain —
   nothing glows all the time */
setInterval(function(){
  var tw = performance.now() * .001;
  var W = innerWidth, H = innerHeight;
  cols.forEach(function(col, ci){
    var x = (ci + .5) / cols.length;
    col.cells.forEach(function(cell, k){
      var y = ((col.y + k * (cell.offsetHeight || 160)) % H) / H;
      var w1 = Math.sin(x * 5.2 + tw * .5) * Math.sin(y * 4.1 - tw * .33);
      var w2 = Math.sin(x * 2.1 - tw * .21 + cell._ph);
      var o = .5 + .42 * (w1 * .7 + w2 * .3);
      cell.style.opacity = Math.max(.10, Math.min(.96, o)).toFixed(2);
    });
  });
}, 140);

/* ---- the arrest ---- */
var nbs = [], lastIdx = -1, manualUntil = 0;
function clearRecall(){
  document.getElementById('focus').classList.remove('on');
  nbs.forEach(function(el){
    el.classList.remove('on');
    setTimeout(function(){ el.remove(); }, 1200);
  });
  nbs = [];
}
function placeNatural(el, img, targetW, cx, cy, maxH){
  function apply(){
    var r = (img.naturalHeight || 1) / (img.naturalWidth || 1);
    var w = targetW, h = targetW * r;
    if (h > maxH){ h = maxH; w = h / r; }
    el.style.width = w + 'px';
    el.style.left = (cx - w/2) + 'px';
    el.style.top = (cy - h/2) + 'px';
  }
  if (img.complete && img.naturalWidth) apply();
  else img.onload = apply;
}
function arrest(key, traceId){
  if (!MAP || !MAP[key]) return;
  clearRecall();
  speedTarget = 0;
  document.getElementById('flow').classList.add('dim');
  var W = innerWidth, H = innerHeight;
  var vm = Math.min(W, H) / 100;
  var focus = document.getElementById('focus');
  var fimg = focus.querySelector('img');
  fimg.src = thumbOfKey(key);
  placeNatural(focus, fimg, 46 * vm, W/2, H/2, H * .62);
  setTimeout(function(){ focus.classList.add('on'); }, 500);
  /* the recollections surface at their TRUE positions in her memory map —
     direction and distance are the real geometry of association, not a shape.
     while held, they drift slowly inward, drawn toward the attention. */
  var focusXY = MAP[key].xy;
  var list = MAP[key].nn.slice(0, 7);
  var pts = list.map(function(pair){
    var nxy = (MAP[pair[0]] || {}).xy || [Math.random(), Math.random()];
    return { key: pair[0], sim: pair[1],
      dx: nxy[0] - focusXY[0], dy: nxy[1] - focusXY[1] };
  });
  var maxd = 0.0001;
  pts.forEach(function(p){ maxd = Math.max(maxd, Math.hypot(p.dx, p.dy)); });
  var inner = 27 * vm;                      /* keep clear of the focus */
  var span = Math.min(W, H) * .33;
  pts.forEach(function(p, i){
    var d = Math.hypot(p.dx, p.dy);
    var ux = d ? p.dx / d : Math.cos(i), uy = d ? p.dy / d : Math.sin(i);
    var rad = inner + (d / maxd) * span;
    var size = (11 + p.sim * 9) * vm;
    var cx = W/2 + ux * rad * 1.25;
    var cy = H/2 + uy * rad * .95;
    cx = Math.max(size/2 + 10, Math.min(W - size/2 - 10, cx));
    cy = Math.max(size/2 + 14, Math.min(H - size/2 - 20, cy));
    p.cx = cx; p.cy = cy; p.size = size;
  });
  /* gentle de-overlap so kin stay close but readable */
  for (var pass = 0; pass < 3; pass++){
    for (var a = 0; a < pts.length; a++) for (var b = a+1; b < pts.length; b++){
      var ddx = pts[b].cx - pts[a].cx, ddy = pts[b].cy - pts[a].cy;
      var dist = Math.hypot(ddx, ddy) || 1;
      var min = (pts[a].size + pts[b].size) * .55;
      if (dist < min){
        var push = (min - dist) / 2;
        pts[a].cx -= ddx/dist*push; pts[a].cy -= ddy/dist*push;
        pts[b].cx += ddx/dist*push; pts[b].cy += ddy/dist*push;
      }
    }
  }
  pts.forEach(function(p, i){
    var el = document.createElement('div');
    el.className = 'nb';
    var im = document.createElement('img');
    im.src = thumbOfKey(p.key);
    el.appendChild(im);
    placeNatural(el, im, p.size, p.cx, p.cy, p.size * 1.5);
    el.onclick = (function(k){ return function(){
      manualUntil = Date.now() + TRACE_DUR;
      arrest(k, null);
    }; })(p.key);
    document.body.appendChild(el);
    nbs.push(el);
    setTimeout(function(){ el.classList.add('on'); }, 1600 + i * 170);
    /* the slow pull of attention */
    (function(px, py, s){
      setTimeout(function(){
        var tx = px + (W/2 - px) * .16, ty = py + (H/2 - py) * .16;
        el.style.left = (tx - s/2) + 'px';
        el.style.top = (ty - s/2) + 'px';
      }, 2200);
    })(p.cx, p.cy, p.size);
  });
}
function release(){
  clearRecall();
  speedTarget = 1;
  document.getElementById('flow').classList.remove('dim');
}
function watchClock(){
  var ms = Date.now() % TRACE_DUR;
  if (replayEvents.length && MAP && Date.now() > manualUntil){
    var idx = Math.floor(Date.now() / TRACE_DUR) % replayEvents.length;
    if (idx !== lastIdx && ms >= HOLD_FROM){
      lastIdx = idx;
      var ev = replayEvents[idx];
      arrest(ev.image, ev.trace_id);
    }
    if (ms >= RELEASE_AT && nbs.length) release();
  }
  setTimeout(watchClock, 450);
}

Promise.all([
  fetch('archive_images.json?t=' + Date.now()).then(function(r){ return r.json(); }),
  fetch('memory_map.json?t=' + Date.now()).then(function(r){ return r.json(); }),
  fetch('replay_data.json?t=' + Date.now()).then(function(r){ return r.json(); }),
]).then(function(res){
  for (var d in res[0]) res[0][d].forEach(function(f){ allPool.push({ d: d, f: f }); });
  reshuffle();
  MAP = res[1].items;
  replayEvents = res[2].events;
  buildFlow();
  watchClock();
});
var rz;
window.onresize = function(){ clearTimeout(rz); rz = setTimeout(function(){
  buildFlow(); lastIdx = -1;
}, 400); };
</script>
</body>
</html>

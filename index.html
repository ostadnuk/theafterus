<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>the after us</title>
<meta name="description" content="A machine from the far future reads the material traces humanity left behind.">
<style>
  :root{
    --bg:#050607; --ink:#d2d6da; --dim:#6a727b; --line:#16181B;
    --hot:#DADFE6; --warn:#C3401F;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:var(--mono); display:flex; align-items:center; justify-content:center; }
  main{ text-align:center; padding:24px; }
  h1{ font-size:26px; font-weight:normal; letter-spacing:.34em; color:var(--hot);
    margin:0 0 10px; text-transform:uppercase; }
  p.sub{ font-size:10px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--dim); margin:0 0 46px; }
  .doors{ display:flex; gap:1px; justify-content:center; flex-wrap:wrap; }
  .doors a{ display:block; width:230px; padding:26px 18px 22px; text-decoration:none;
    border:1px solid var(--line); color:var(--ink); text-align:right;
    transition:border-color .4s ease; }
  .doors a:hover{ border-color:var(--dim); }
  .doors .k{ display:block; font-size:9px; letter-spacing:.22em; color:var(--warn);
    text-transform:uppercase; margin-bottom:14px; text-align:left; }
  .doors .t{ display:block; font-size:13px; letter-spacing:.06em; color:var(--hot);
    direction:rtl; margin-bottom:6px; }
  .doors .d{ display:block; font-size:10px; line-height:1.7; color:var(--dim);
    direction:rtl; }
  footer{ position:fixed; bottom:12px; left:0; right:0; text-align:center;
    font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--dim); }
</style>
</head>
<body>
<main>
  <h1>The After Us</h1>
  <p class="sub">material traces · read by what remained</p>
  <div class="doors">
    <a href="machine.html">
      <span class="k">01 / MACHINE</span>
      <span class="t">המכונה</span>
      <span class="d">קוראת את העקבות. מתארת גאומטריה, בונה מרחב שאין לה דרך להבין.</span>
    </a>
    <a href="recall.html">
      <span class="k">02 / ARCHIVE</span>
      <span class="t">הארכיון</span>
      <span class="d">מה שהושאר בכוונה ומה שנשאר בלי כוונה — נודדים זה אל זה.</span>
    </a>
  </div>
</main>
<footer>theafterus.com</footer>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>trace archive</title>
<style>
  html,body{ margin:0; height:100%; background:#050607; color:#d2d6da;
    font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace; overflow:hidden; }
  #topbar{ position:fixed; top:0; left:0; right:0; height:44px; z-index:5;
    background:#050607; }
  #title{ position:absolute; top:15px; left:18px; font-size:13px;
    letter-spacing:.26em; text-transform:uppercase; color:#DADFE6; }
  #title a{ color:#6a727b; text-decoration:none; }
  #grid{ position:fixed; top:44px; left:0; right:0; bottom:6px;
    font-size:0; overflow:hidden; }
  #grid img{ display:inline-block; object-fit:cover; margin:0; padding:0;
    border:1px solid #16181B; box-sizing:border-box; background:#0a0b0d;
    transition:opacity 2.5s ease; }
  #grid.reading img{ opacity:.32; }
  #grid.reading img.read{ opacity:1; }
  #readmark{ position:fixed; display:none; z-index:6; pointer-events:none; }
  #readmark .c{ position:absolute; width:22px; height:22px; border:2px solid #eef3f7; }
  #readmark .c1{ top:0; left:0; border-right:none; border-bottom:none; }
  #readmark .c2{ top:0; right:0; border-left:none; border-bottom:none; }
  #readmark .c3{ bottom:0; left:0; border-right:none; border-top:none; }
  #readmark .c4{ bottom:0; right:0; border-left:none; border-top:none; }
  #readmark .lbl{ position:absolute; top:-24px; left:0; font-size:12px;
    letter-spacing:.2em; color:#eef3f7; text-transform:uppercase; white-space:nowrap; }
  #box{ position:fixed; top:0; left:0; right:0; bottom:0; z-index:20;
    display:none; background:rgba(5,6,7,.96); text-align:center; }
  #box.open{ display:block; }
  #boximg{ margin-top:4vh; max-width:84vw; max-height:78vh; border:1px solid #16181B; }
  #boxmeta{ margin-top:12px; font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:#6a727b; }
  #boxmeta b{ color:#DADFE6; font-weight:normal; }
</style>
</head>
<body>

<div id="topbar"><div id="title"><a href="machine.html">MACHINE</a>&nbsp;&nbsp;<span style="color:#DADFE6">ARCHIVE</span>&nbsp;&nbsp;<a href="recall.html" style="text-decoration:none;color:#6a727b">RECALL</a> <span id="total"></span></div></div>
<div id="grid"></div>
<div id="box"><img id="boximg" alt=""><div id="boxmeta"></div></div>
<div id="readmark"><span class="c c1"></span><span class="c c2"></span><span class="c c3"></span><span class="c c4"></span><div class="lbl"></div></div>

<script>
/* the archive as the machine received it: one undifferentiated stream.
   a shuffle bag guarantees every trace is eventually shown, none favoured. */
var allPool = [], bag = [], bagPos = 0;
var imgs = [];
var t0 = Date.now();

function reshuffle(){
  bag = allPool.slice();
  for (var i = bag.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = bag[i]; bag[i] = bag[j]; bag[j] = tmp;
  }
  bagPos = 0;
}
function nextItem(){
  if (!bag.length) return null;
  if (bagPos >= bag.length) reshuffle();
  return bag[bagPos++];
}
function thumbSrc(d, f){
  return encodeURI('archives/thumbs/' + d + '/' + f.replace(/\.gif$/i, '.png'));
}
function fullSrc(d, f){
  return encodeURI('archives/' + d + '/' + f);
}

function buildGrid(){
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  imgs = [];
  var w = grid.clientWidth, h = grid.clientHeight;
  var cols = Math.max(2, Math.round(w / 210));
  var rows = Math.max(2, Math.round(h / 210));
  var cw = Math.floor(w / cols), ch = Math.floor(h / rows);
  for (var i = 0; i < cols * rows; i++){
    var img = document.createElement('img');
    img.style.width = cw + 'px';
    img.style.height = ch + 'px';
    img.onclick = (function(el){ return function(){ openBox(el); }; })(img);
    grid.appendChild(img);
    imgs.push(img);
    assign(img);
  }
}

function assign(img){
  var item = nextItem();
  if (!item) return;
  img.setAttribute('data-dir', item.d);
  img.setAttribute('data-file', item.f);
  img.src = thumbSrc(item.d, item.f);
  img.onerror = function(){ img.onerror = null; img.src = fullSrc(item.d, item.f); };
}

function tick(){
  if (imgs.length){
    var candidate = imgs[Math.floor(Math.random() * imgs.length)];
    if (candidate !== readImg) assign(candidate);
  }
  /* no categories left — only a slow breath in the tempo */
  var breathe = Math.sin((Date.now() - t0) / 52000 * 2 * Math.PI);
  setTimeout(tick, 2100 + 800 * breathe);
}

/* ---- synced reading: same wall-clock index as the machine screen ---- */
var TRACE_DUR = 26000, READ_HOLD = 20000;
var replayEvents = [], lastIdx = -1, readImg = null;
function watchClock(){
  if (replayEvents.length){
    var idx = Math.floor(Date.now() / TRACE_DUR) % replayEvents.length;
    if (idx !== lastIdx){ lastIdx = idx; highlight(replayEvents[idx]); }
  }
  setTimeout(watchClock, 700);
}
function placeMark(ev){
  if (!readImg) return;
  var r = readImg.getBoundingClientRect();
  var m = document.getElementById('readmark');
  m.style.left = r.left + 'px'; m.style.top = r.top + 'px';
  m.style.width = r.width + 'px'; m.style.height = r.height + 'px';
  m.querySelector('.lbl').textContent = 'READING · ' + (ev.trace_id || '');
  m.style.display = 'block';
}
function highlight(ev){
  if (readImg){ readImg.className = ''; readImg = null; }
  var grid = document.getElementById('grid');
  var el = imgs[Math.floor(imgs.length/2)] || imgs[0];
  if (!el) return;
  var parts = ev.image.split('/');
  var d = parts.slice(1, -1).join('/'), f = parts[parts.length - 1];
  el.setAttribute('data-dir', d);
  el.setAttribute('data-file', f);
  el.src = thumbSrc(d, f);
  el.className = 'read';
  readImg = el;
  grid.className = 'reading';
  placeMark(ev);
  setTimeout(function(){
    grid.className = '';
    document.getElementById('readmark').style.display = 'none';
    if (readImg){ readImg.className = ''; readImg = null; }
  }, READ_HOLD);
}
fetch('replay_data.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(j){
  replayEvents = j.events; watchClock();
});

function openBox(img){
  var d = img.getAttribute('data-dir'), f = img.getAttribute('data-file');
  if (!f) return;
  document.getElementById('boximg').src = fullSrc(d, f);
  document.getElementById('boxmeta').textContent = f;
  document.getElementById('box').classList.add('open');
}
document.getElementById('box').onclick = function(){
  document.getElementById('box').classList.remove('open');
};

var rz;
window.onresize = function(){ clearTimeout(rz); rz = setTimeout(buildGrid, 400); };

fetch('archive_images.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(j){
  for (var d in j) j[d].forEach(function(f){ allPool.push({ d: d, f: f }); });
  reshuffle();
  document.getElementById('total').textContent = '· ' + allPool.length + ' TRACES';
  buildGrid();
  tick();
});
</script>
</body>
</html>
